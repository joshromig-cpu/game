<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover lets us render under the notch / home indicator on iOS;
       maximum-scale + user-scalable=no prevents accidental pinch-zoom on iOS Safari. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Colors of the Moment Fade Away</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    // Global error handler — surfaces crashes in mobile browser dev tools / overlay.
    window.__lastError = null;
    window.onerror = function (msg, src, line, col, err) {
      const text = `[ERR] ${msg} @ ${src}:${line}:${col}`;
      window.__lastError = text;
      try { console.error(text, err); } catch (e) {}
    };
    window.addEventListener('unhandledrejection', function (ev) {
      const text = `[PROMISE] ${ev.reason && ev.reason.message ? ev.reason.message : ev.reason}`;
      window.__lastError = text;
      try { console.error(text); } catch (e) {}
    });

    // Block native scroll/zoom gestures on touch even before Phaser boots,
    // so the page can't rubber-band while assets load.
    const stopTouch = (e) => { if (e.cancelable) e.preventDefault(); };
    document.addEventListener('touchstart', stopTouch, { passive: false });
    document.addEventListener('touchmove',  stopTouch, { passive: false });
    document.addEventListener('gesturestart', stopTouch, { passive: false });
  </script>
</head>
<body>
  <div id="game-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script>window.__BUST = Date.now();</script>
  <script src="js/utils/constants.js?v=6"></script>
  <script src="js/utils/MobileSupport.js?v=6"></script>
  <script src="js/entities/Player.js?v=6"></script>
  <script src="js/entities/CloudEnemy.js?v=6"></script>
  <script src="js/entities/Spangerell.js?v=6"></script>
  <script src="js/systems/TouchControls.js?v=6"></script>
  <script src="js/systems/DebugOverlay.js?v=6"></script>
  <script src="js/scenes/BootScene.js?v=6"></script>
  <script src="js/scenes/Level1Scene.js?v=6"></script>
  <script src="js/scenes/Level3BossScene.js?v=6"></script>
  <script src="js/scenes/HUDScene.js?v=6"></script>
  <script src="js/main.js?v=6"></script>
</body>
</html>
